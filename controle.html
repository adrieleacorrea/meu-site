<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Controle de Celulares</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

    <h1>📱 Controle de Entrada e Saída</h1>

    <input type="text" id="nome" placeholder="Nome da pessoa">
    <input type="text" id="empresa" placeholder="Empresa">
    <input type="text" id="imei" placeholder="IMEI do celular">

    <button onclick="entrada()">Registrar ENTRADA</button>
    <button onclick="saida()">Registrar SAÍDA</button>

    <h3>📋 Registros</h3>
    <div id="lista"></div>

    <br>
    <a class="botao" href="index.html">⬅ Voltar</a>

</div>

<script>
let registros = JSON.parse(localStorage.getItem("registros")) || [];

function salvar() {
    localStorage.setItem("registros", JSON.stringify(registros));
    mostrar();
}

function entrada() {
    adicionar("ENTRADA");
}

function saida() {
    adicionar("SAÍDA");
}

function adicionar(tipo) {
    let nome = document.getElementById("nome").value;
    let empresa = document.getElementById("empresa").value;
    let imei = document.getElementById("imei").value;

    if (!nome || !empresa || !imei) {
        alert("Preencha tudo!");
        return;
    }

    registros.push({
        tipo,
        nome,
        empresa,
        imei,
        data: new Date().toLocaleString()
    });

    salvar();

    document.getElementById("nome").value = "";
    document.getElementById("empresa").value = "";
    document.getElementById("imei").value = "";
}

function mostrar() {
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    registros.slice().reverse().forEach(r => {
        lista.innerHTML += `
        <div class="card">
            <strong>${r.tipo}</strong><br>
            Nome: ${r.nome}<br>
            Empresa: ${r.empresa}<br>
            IMEI: ${r.imei}<br>
            Data: ${r.data}
        </div>
        `;
    });
}

mostrar();
</script>

</body>
</html>
